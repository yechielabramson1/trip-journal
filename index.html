<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0f766e">
<title>יומן מסע</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="יומן">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{ --teal:#0f766e; --teal2:#115e59; --ink:#0b1220; --muted:#64748b; --bg:#f1f5f9; --line:#e2e8f0; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent }
  html,body{ margin:0; height:100%; font-family:system-ui,"Segoe UI",Arial,sans-serif; background:var(--bg); color:var(--ink) }
  body{ display:flex; flex-direction:column; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) }
  /* header */
  header{ display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--teal); color:#fff }
  header .icon{ background:transparent; border:0; color:#fff; font-size:1.4rem; padding:4px 8px; border-radius:10px }
  header .icon:active{ background:rgba(255,255,255,.15) }
  #tripname{ flex:1; font-weight:700; font-size:1.05rem; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; background:transparent; border:0; color:#fff }
  #who{ font-size:.8rem; background:rgba(255,255,255,.18); border:0; color:#fff; border-radius:999px; padding:4px 10px; white-space:nowrap }
  /* main */
  main{ flex:1; display:flex; flex-direction:column; padding:12px; gap:10px; min-height:0 }
  textarea{ width:100%; flex:1; min-height:26vh; font-size:1.25rem; padding:14px; border:1px solid #cbd5e1; border-radius:14px; resize:none; line-height:1.5; background:#fff }
  .actions{ display:grid; grid-template-columns:1fr 1fr; gap:10px }
  button.act,label.act{ display:flex; align-items:center; justify-content:center; gap:8px; border:0; border-radius:16px; font-size:1.05rem; font-weight:600; padding:16px; color:#fff; background:var(--teal) }
  button.act:active,label.act:active{ background:var(--teal2) }
  .act.save{ grid-column:1 / -1; font-size:1.2rem; padding:18px }
  .act.photo{ background:#334155 } .act.doc{ background:#475569 } .act.receipt{ background:#0e7490 } .act.ask{ background:#6d28d9 } .act.expense{ background:#15803d }
  .gate .card select{ width:100%; margin:6px 0 12px; padding:13px; font-size:1rem; border:1px solid #cbd5e1; border-radius:12px; background:#fff }
  button:disabled{ opacity:.5 }
  input[type=file]{ display:none }
  #log{ font-size:.8rem; color:var(--muted); max-height:14vh; overflow:auto }
  #log div{ padding:3px 0; border-bottom:1px solid var(--line) }
  #status{ font-size:.85rem; padding:6px 12px; border-radius:999px; background:#e2e8f0; color:var(--muted); align-self:flex-start }
  #status.ok{ background:#dcfce7; color:#15803d } #status.pending{ background:#fef9c3; color:#a16207 } #status.off{ background:#fee2e2; color:#b91c1c }
  /* drawer */
  .scrim{ position:fixed; inset:0; background:rgba(11,18,32,.45); opacity:0; pointer-events:none; transition:opacity .2s; z-index:8 }
  .scrim.open{ opacity:1; pointer-events:auto }
  #drawer{ position:fixed; top:0; right:-86vw; width:86vw; max-width:340px; height:100%; background:#fff; z-index:9;
           transition:right .22s ease; display:flex; flex-direction:column; box-shadow:-8px 0 24px rgba(0,0,0,.15) }
  #drawer.open{ right:0 }
  #drawer h2{ margin:0; padding:18px 16px; background:var(--teal); color:#fff; font-size:1.1rem; padding-top:calc(18px + env(safe-area-inset-top)) }
  #triplist{ flex:1; overflow:auto; padding:6px 0 }
  .trip{ display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line); font-size:1.05rem }
  .trip.active{ background:#ccfbf1; font-weight:700 }
  .trip .dot{ width:8px; height:8px; border-radius:50%; background:#cbd5e1 } .trip.active .dot{ background:var(--teal) }
  #drawer .foot{ padding:12px 16px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:8px }
  #drawer .foot button{ width:100%; padding:14px; border:0; border-radius:14px; font-size:1.05rem; font-weight:600; background:var(--teal); color:#fff }
  #drawer .foot a{ text-align:center; color:var(--teal2); font-size:.9rem; text-decoration:none }
  /* gates / modals */
  .gate{ position:fixed; inset:0; background:rgba(11,18,32,.55); display:flex; align-items:center; justify-content:center; z-index:11; padding:18px }
  .gate[hidden]{ display:none }
  .gate .card{ background:#fff; border-radius:18px; padding:22px; width:min(90vw,380px); text-align:center }
  .gate .card p{ font-size:1.15rem; margin:0 0 14px }
  .gate .card input{ width:100%; margin:6px 0 12px; padding:14px; font-size:1rem; border:1px solid #cbd5e1; border-radius:12px; text-align:center }
  .gate .card textarea{ width:100%; margin:6px 0 10px; padding:12px; font-size:1rem; border:1px solid #cbd5e1; border-radius:12px; resize:none }
  #askreply{ text-align:right; white-space:pre-wrap; font-size:.95rem; line-height:1.5; max-height:42vh; overflow:auto; background:#f8fafc; border-radius:12px; padding:10px; margin:6px 0 }
  #askreply:empty{ display:none }
  .gate .card button{ width:100%; margin:6px 0; padding:16px; font-size:1.1rem; border:0; border-radius:14px; background:var(--teal); color:#fff; font-weight:600 }
  .gate .card .ghost{ background:#e2e8f0; color:var(--ink) }
</style>
</head>
<body>
  <header>
    <button class="icon" id="menu" aria-label="תפריט">☰</button>
    <button id="tripname">…</button>
    <button id="who" aria-label="כותב"></button>
  </header>

  <main>
    <textarea id="txt" placeholder="דבר אל המקלדת או הקלד מה קורה עכשיו…" autocapitalize="sentences"></textarea>
    <div class="actions">
      <button class="act save" id="save">💾 שמור ליומן</button>
      <label class="act photo" for="cam">📷 תמונה</label>
      <label class="act doc" for="docfile">📁 מסמך</label>
      <label class="act receipt" for="rcptfile">🧾 קבלה</label>
      <button class="act expense" id="expensebtn">💶 הוצאה</button>
      <button class="act ask" id="askbtn" style="grid-column:1 / -1">🤖 שאל את הקונסיירז'</button>
    </div>
    <input id="cam" type="file" accept="image/*" capture="environment">
    <input id="docfile" type="file">
    <input id="rcptfile" type="file" accept="image/*,application/pdf">
    <div id="status">…</div>
    <div id="log"></div>
  </main>

  <!-- drawer -->
  <div class="scrim" id="scrim"></div>
  <nav id="drawer" aria-label="המסעות שלי">
    <h2>🏔️ המסעות שלי</h2>
    <div id="triplist"></div>
    <div class="foot">
      <button id="newtrip">➕ טיול חדש</button>
      <a id="drivelink" href="#" target="_blank" rel="noopener">📂 פתח את הטיול בדרייב</a>
    </div>
  </nav>

  <!-- token gate -->
  <div id="tokengate" class="gate" hidden><div class="card">
    <p>הדבק את ה-token · Paste token</p>
    <input id="tokin" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="xxxxxxxx-xxxx-…">
    <button id="toksave">שמור · Save</button>
  </div></div>

  <!-- author gate -->
  <div id="gate" class="gate" hidden><div class="card">
    <p>מי כותב? · Who's writing?</p>
    <button data-name="יחיאל">יחיאל</button>
    <button data-name="Sky">Sky</button>
  </div></div>

  <!-- AI concierge -->
  <div id="askgate" class="gate" hidden><div class="card" style="text-align:right">
    <p>🤖 קונסיירז' AI</p>
    <textarea id="askq" rows="2" placeholder="שאל על המסע… מקום, תאריך, מה עשינו"></textarea>
    <div id="askreply"></div>
    <a id="storylink" href="#" target="_blank" rel="noopener" style="display:none; text-align:center; color:var(--teal2); text-decoration:none; margin:4px 0">📂 פתח את הסיפור המלא</a>
    <button id="asksend">שאל</button>
    <button id="storybtn" class="ghost">📖 ספר את הסיפור</button>
    <button id="askclose" class="ghost">סגור</button>
  </div></div>

  <!-- expense gate -->
  <div id="expensegate" class="gate" hidden><div class="card" style="text-align:right">
    <p>💶 הוצאה חדשה</p>
    <input id="exAmount" type="number" inputmode="decimal" placeholder="סכום">
    <select id="exCurrency"><option value="EUR">EUR €</option><option value="ILS">ILS ₪</option><option value="USD">USD $</option></select>
    <select id="exCategory">
      <option>טיסות</option><option>השכרת רכב</option><option>לינה</option><option>אוכל ומסעדות</option>
      <option>דלק/תחבורה</option><option>אטרקציות</option><option>קניות</option><option>אחר</option>
    </select>
    <input id="exDesc" type="text" placeholder="תיאור (לא חובה)">
    <select id="exMethod"><option>Apple Pay</option><option>מזומן</option><option>כרטיס אשראי</option><option>אחר</option></select>
    <label class="act receipt" for="exReceipt" id="exReceiptLabel" style="font-size:.95rem; padding:12px; margin-bottom:8px">📷 צרף קבלה (לא חובה)</label>
    <input id="exReceipt" type="file" accept="image/*">
    <button id="exPaste" class="ghost" style="margin-bottom:8px">📋 הדבק צילום מהלוח (Copy &amp; Delete)</button>
    <label style="display:flex; align-items:center; gap:8px; justify-content:flex-end; font-size:.88rem; color:#475569; margin:0 0 10px">
      <input id="exKeepImg" type="checkbox" style="width:auto; margin:0"> שמור גם את צילום הקבלה (לקבלות אמיתיות)
    </label>
    <button id="exSave">💾 שמור הוצאה</button>
    <button id="exDelete" class="ghost" style="display:none; color:#b91c1c">🗑️ מחק הוצאה</button>
    <button id="exEditBtn" class="ghost">📋 ערוך הוצאה קיימת</button>
    <div id="exList" style="display:none; max-height:30vh; overflow:auto; text-align:right; margin:6px 0"></div>
    <a id="exSheetLink" href="#" target="_blank" rel="noopener" style="display:none; text-align:center; color:var(--teal2); text-decoration:none; margin:8px 0">📊 הצצה לגיליון ההוצאות</a>
    <button id="exClose" class="ghost">סגור</button>
  </div></div>

  <!-- new trip gate -->
  <div id="newtripgate" class="gate" hidden><div class="card">
    <p>שם הטיול החדש · New trip name</p>
    <input id="newtripname" type="text" placeholder="לדוגמה: יוון 2026">
    <button id="newtripcreate">צור טיול · Create</button>
    <button id="newtripcancel" class="ghost">ביטול · Cancel</button>
  </div></div>

<script src="app.js"></script>
</body>
</html>
